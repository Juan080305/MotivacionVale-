<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Vale 🌻</title>
  <style>
    :root{
      --bg1:#0b1120;
      --bg2:#172554;
      --petal1:#fde047;
      --petal2:#f59e0b;
      --center1:#7c4a03;
      --center2:#3f2a00;
      --stem:#1f8a45;
      --leaf1:#22c55e;
      --leaf2:#166534;
      --text:#fff3c8;
      --sub:#ffe678;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:linear-gradient(180deg,var(--bg2),var(--bg1));
    }
    canvas{
      display:block;
      width:100vw;
      height:100vh;
      touch-action:manipulation;
    }
    .overlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:24px 16px;
      text-align:center;
    }
    .card{
      margin-top:18px;
      max-width:680px;
      color:var(--text);
      text-shadow:0 3px 12px rgba(0,0,0,.45);
      animation:fadeUp 1.4s ease forwards;
    }
    h1{
      margin:0 0 8px;
      font-size:clamp(1.8rem,5vw,3rem);
      line-height:1.15;
    }
    p{
      margin:0;
      color:var(--sub);
      font-size:clamp(1rem,3.7vw,1.35rem);
    }
    .hint{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      color:rgba(255,255,255,.82);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      padding:10px 14px;
      font-size:.95rem;
      backdrop-filter:blur(6px);
      pointer-events:none;
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="overlay">
    <div class="card">
      <h1>Vale,</h1>
      <p>felicidades, eres muy inteligente 🌻</p>
      <p style="margin-top:8px;color:#fff;">Con cariño, para ti.</p>
    </div>
  </div>

  <div class="hint">Toca la pantalla y aparecerán más girasoles ✨</div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    let w=0,h=0,dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
    let flowers=[];

    function resize(){
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w*dpr);
      canvas.height = Math.floor(h*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      if (!flowers.length) seed();
    }

    function rand(min,max){ return Math.random()*(max-min)+min; }

    function makeFlower(x, groundY, scale=1){
      return {
        x,
        groundY,
        stemLen: rand(150,250)*scale,
        currentLen: 0,
        stemWidth: rand(5,9)*scale,
        bloomR: rand(24,38)*scale,
        petals: Math.floor(rand(16,23)),
        sway: rand(-0.7,0.7),
        swaySpeed: rand(0.008,0.018),
        phase: rand(0, Math.PI*2),
        leaves: [
          {pos: rand(0.35,0.52), size: rand(18,30)*scale, side: -1},
          {pos: rand(0.58,0.78), size: rand(18,28)*scale, side: 1}
        ]
      };
    }

    function seed(){
      flowers = [];
      const count = Math.max(3, Math.min(6, Math.floor(w/100)));
      const ground = h - 55;
      for(let i=0;i<count;i++){
        const x = (w*0.14) + i*((w*0.72)/Math.max(1,count-1)) + rand(-18,18);
        flowers.push(makeFlower(x, ground+rand(-8,8), rand(0.85,1.2)));
      }
    }

    function drawBackground(){
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0, "#172554");
      g.addColorStop(1, "#0b1120");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);

      for(let i=0;i<26;i++){
        const x = (i*97)%w;
        const y = (i*61)%(h*0.42) + 18;
        const r = i%3===0 ? 2 : 1;
        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fill();
      }

      ctx.fillStyle = "#12341c";
      ctx.fillRect(0,h-140,w,140);
    }

    function drawLeaf(x,y,size,side,angle){
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(angle);
      ctx.scale(side,1);
      const lg = ctx.createLinearGradient(0,0,size,0);
      lg.addColorStop(0,"#22c55e");
      lg.addColorStop(1,"#166534");
      ctx.fillStyle = lg;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.quadraticCurveTo(size*0.5,-size*0.65,size,0);
      ctx.quadraticCurveTo(size*0.5,size*0.4,0,0);
      ctx.fill();
      ctx.restore();
    }

    function drawFlower(f,t){
      if(f.currentLen < f.stemLen){
        f.currentLen += Math.max(0.8, f.stemLen/180);
      } else {
        f.currentLen = f.stemLen;
      }

      const sway = Math.sin(t*f.swaySpeed + f.phase) * 12 * f.sway;
      const topX = f.x + sway;
      const topY = f.groundY - f.currentLen;

      ctx.strokeStyle = "#1f8a45";
      ctx.lineWidth = f.stemWidth;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(f.x, f.groundY);
      ctx.quadraticCurveTo(f.x + sway*1.3, f.groundY - f.currentLen*0.45, topX, topY);
      ctx.stroke();

      for(const leaf of f.leaves){
        const ly = f.groundY - f.currentLen*leaf.pos;
        if(ly > topY + 18){
          drawLeaf(f.x + sway*0.25, ly, leaf.size, leaf.side, leaf.side*(-0.35));
        }
      }

      if (f.currentLen >= f.stemLen*0.98){
        for(let i=0;i<f.petals;i++){
          const ang = (Math.PI*2/f.petals)*i + t*0.00035;
          const px = topX + Math.cos(ang)*(f.bloomR*0.82);
          const py = topY + Math.sin(ang)*(f.bloomR*0.82);

          ctx.save();
          ctx.translate(px,py);
          ctx.rotate(ang);
          const pg = ctx.createLinearGradient(0,-f.bloomR*0.8,0,f.bloomR*0.8);
          pg.addColorStop(0,"#fde047");
          pg.addColorStop(1,"#f59e0b");
          ctx.fillStyle = pg;
          ctx.beginPath();
          ctx.ellipse(0,0,f.bloomR*0.38,f.bloomR*0.9,0,0,Math.PI*2);
          ctx.fill();
          ctx.restore();
        }

        const cg = ctx.createRadialGradient(topX-4,topY-4,3,topX,topY,f.bloomR*0.8);
        cg.addColorStop(0,"#7c4a03");
        cg.addColorStop(1,"#3f2a00");
        ctx.fillStyle = cg;
        ctx.beginPath();
        ctx.arc(topX,topY,f.bloomR*0.68,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "rgba(255,220,120,.55)";
        for(let i=0;i<16;i++){
          const a = (Math.PI*2/16)*i;
          const rr = f.bloomR*(0.15 + (i%4)*0.08);
          ctx.beginPath();
          ctx.arc(topX + Math.cos(a)*rr, topY + Math.sin(a)*rr, 1.5, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }

    function loop(t){
      drawBackground();
      flowers.forEach(fl => drawFlower(fl, t));
      requestAnimationFrame(loop);
    }

    function addFlower(clientX){
      flowers.push(makeFlower(clientX, h-rand(40,70), rand(0.72,1.15)));
      if(flowers.length > 20) flowers.shift();
    }

    window.addEventListener("resize", resize);
    canvas.addEventListener("pointerdown", e => addFlower(e.clientX));
    canvas.addEventListener("touchstart", e => {
      if (e.touches && e.touches[0]) addFlower(e.touches[0].clientX);
    }, {passive:true});

    resize();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
