<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vale, vamosss tú puedes</title>
  <style>
    :root{
      --bg1:#fff4fb;
      --bg2:#ffdcea;
      --bg3:#ffeef5;
      --pink1:#ff5d99;
      --pink2:#ff8ebb;
      --pink3:#ffd2e3;
      --pink4:#eb3e82;
      --pink5:#ffb1cf;
      --leaf1:#3f9d67;
      --leaf2:#62b37d;
      --leaf3:#2d7d52;
      --shadow: rgba(88, 26, 58, 0.18);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family: "Georgia", "Times New Roman", serif;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.85), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,.65), transparent 20%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      color:#6b1d45;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      position:relative;
      padding:22px 14px 18px;
    }

    .sparkles{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .sparkles span{
      position:absolute;
      width:10px;height:10px;
      border-radius:50%;
      background:rgba(255,255,255,.8);
      box-shadow:0 0 18px rgba(255,255,255,.75);
      animation: float 7s linear infinite;
      opacity:.9;
    }

    .sparkles span:nth-child(1){left:8%; top:15%; animation-delay:0s;}
    .sparkles span:nth-child(2){left:20%; top:72%; width:7px;height:7px; animation-delay:1s;}
    .sparkles span:nth-child(3){left:84%; top:22%; width:8px;height:8px; animation-delay:2s;}
    .sparkles span:nth-child(4){left:71%; top:65%; width:6px;height:6px; animation-delay:3s;}
    .sparkles span:nth-child(5){left:50%; top:10%; width:9px;height:9px; animation-delay:4s;}
    .sparkles span:nth-child(6){left:38%; top:52%; width:6px;height:6px; animation-delay:5s;}

    @keyframes float{
      0%{transform:translateY(0) scale(.8); opacity:.2;}
      50%{opacity:1;}
      100%{transform:translateY(-22px) scale(1.2); opacity:.1;}
    }

    .message{
      margin-top:4px;
      text-align:center;
      z-index:2;
      max-width:760px;
      padding:14px 16px 16px;
      background:rgba(255,255,255,.42);
      backdrop-filter: blur(6px);
      border:1px solid rgba(255,255,255,.55);
      border-radius:26px;
      box-shadow:0 14px 38px var(--shadow);
    }

    .message h1{
      margin:0;
      font-size:clamp(2rem, 6vw, 4rem);
      line-height:1.05;
      color:#a61f62;
      text-shadow: 0 2px 0 rgba(255,255,255,.7);
      letter-spacing:.5px;
    }

    .message p{
      margin:10px 0 0;
      font-size:clamp(1rem, 3.7vw, 1.35rem);
      color:#813256;
    }

    .music-row{
      margin-top:14px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .music-btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      text-decoration:none;
      font-size:0.98rem;
      font-weight:bold;
      color:white;
      background:linear-gradient(180deg, #ff6ca5, #d93b80);
      box-shadow:0 10px 22px rgba(166,31,98,.24);
    }


    .scene{
      width:min(100%, 950px);
      flex:1;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      position:relative;
      padding-bottom:8px;
    }

    .ground{
      position:absolute;
      left:0; right:0; bottom:0;
      height:22%;
      background:
        radial-gradient(circle at 20% 35%, rgba(255,255,255,.13), transparent 14%),
        radial-gradient(circle at 62% 30%, rgba(255,255,255,.08), transparent 11%),
        linear-gradient(180deg, #7a5238, #5a3928 74%, #4a2e21);
      border-radius:46% 46% 0 0 / 18% 18% 0 0;
      box-shadow: inset 0 16px 30px rgba(255,255,255,.08), 0 -4px 18px rgba(0,0,0,.08);
    }

    .flowers{
      position:relative;
      width:100%;
      height:min(75vh, 760px);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:1.1vw;
      padding:0 4vw 10vh;
      z-index:2;
    }

    .tulip{
      --scale:1;
      position:relative;
      width:100px;
      height:450px;
      transform-origin:bottom center;
      animation:sway 5.4s ease-in-out infinite;
      filter: drop-shadow(0 18px 18px rgba(0,0,0,.12));
      transform:scale(var(--scale));
    }

    .tulip:nth-child(2){animation-delay:.6s}
    .tulip:nth-child(3){animation-delay:1.4s}
    .tulip:nth-child(4){animation-delay:2.1s}
    .tulip:nth-child(5){animation-delay:2.7s}

    @keyframes sway{
      0%,100%{ transform: translateY(0) rotate(-2deg) scale(var(--scale));}
      50%{ transform: translateY(-4px) rotate(2deg) scale(var(--scale));}
    }

    .stem{
      position:absolute;
      bottom:38px;
      left:50%;
      width:14px;
      height:260px;
      transform:translateX(-50%);
      background:linear-gradient(180deg, #7fd396, var(--leaf1) 45%, var(--leaf3));
      border-radius:12px;
      box-shadow: inset -2px 0 3px rgba(255,255,255,.35), inset 3px 0 4px rgba(0,0,0,.08);
    }

    .leaf{
      position:absolute;
      bottom:110px;
      width:86px;
      height:145px;
      background:linear-gradient(180deg, var(--leaf2), var(--leaf3));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
    }

    .leaf.left{
      left:4px;
      border-radius:0 100% 0 100%;
      transform:rotate(-28deg) skewY(-5deg);
    }

    .leaf.right{
      right:0px;
      bottom:135px;
      border-radius:100% 0 100% 0;
      transform:rotate(31deg) skewY(5deg);
    }

    .leaf:after{
      content:"";
      position:absolute;
      left:48%;
      top:8px;
      width:2px;
      height:120px;
      background:rgba(255,255,255,.25);
      transform:translateX(-50%) rotate(8deg);
      border-radius:2px;
    }

    .bloom{
      position:absolute;
      left:50%;
      top:18px;
      width:132px;
      height:138px;
      transform:translateX(-50%);
    }

    .petal{
      position:absolute;
      box-shadow:
        inset 0 -9px 12px rgba(255,255,255,.18),
        inset 0 10px 14px rgba(255,255,255,.18),
        0 4px 10px rgba(158, 39, 97, .12);
      border:1px solid rgba(162, 28, 92, .14);
      transform-origin:bottom center;
    }

    .petal.outer-left{
      left:14px;
      top:28px;
      width:46px;
      height:92px;
      background:linear-gradient(180deg, #ffd7e6 0%, var(--pink2) 50%, var(--pink4) 100%);
      border-radius:58% 42% 55% 50% / 20% 22% 78% 80%;
      clip-path:polygon(50% 0%, 68% 8%, 80% 24%, 82% 44%, 74% 76%, 58% 100%, 38% 100%, 20% 74%, 16% 44%, 24% 22%, 36% 8%);
      transform:rotate(-18deg);
      z-index:2;
    }

    .petal.outer-right{
      right:14px;
      top:28px;
      width:46px;
      height:92px;
      background:linear-gradient(180deg, #ffd7e6 0%, var(--pink2) 50%, var(--pink4) 100%);
      border-radius:42% 58% 50% 55% / 22% 20% 80% 78%;
      clip-path:polygon(50% 0%, 64% 8%, 76% 22%, 84% 44%, 80% 74%, 62% 100%, 42% 100%, 26% 76%, 18% 44%, 20% 24%, 32% 8%);
      transform:rotate(18deg);
      z-index:2;
    }

    .petal.center-left{
      left:30px;
      top:12px;
      width:40px;
      height:108px;
      background:linear-gradient(180deg, #fff0f6 0%, var(--pink5) 40%, var(--pink1) 76%, var(--pink4) 100%);
      border-radius:50% 50% 46% 46% / 16% 16% 84% 84%;
      clip-path:polygon(50% 0%, 62% 10%, 72% 30%, 74% 54%, 68% 82%, 56% 100%, 44% 100%, 32% 82%, 26% 54%, 28% 30%, 38% 10%);
      transform:rotate(-8deg);
      z-index:4;
    }

    .petal.center-right{
      right:30px;
      top:12px;
      width:40px;
      height:108px;
      background:linear-gradient(180deg, #fff0f6 0%, var(--pink5) 40%, var(--pink1) 76%, var(--pink4) 100%);
      border-radius:50% 50% 46% 46% / 16% 16% 84% 84%;
      clip-path:polygon(50% 0%, 62% 10%, 72% 30%, 74% 54%, 68% 82%, 56% 100%, 44% 100%, 32% 82%, 26% 54%, 28% 30%, 38% 10%);
      transform:rotate(8deg);
      z-index:4;
    }

    .petal.front{
      left:50%;
      top:26px;
      width:58px;
      height:102px;
      transform:translateX(-50%);
      background:linear-gradient(180deg, #ffe9f2 0%, var(--pink3) 38%, var(--pink1) 75%, var(--pink4) 100%);
      border-radius:50% 50% 44% 44% / 18% 18% 82% 82%;
      clip-path:polygon(50% 0%, 68% 10%, 82% 28%, 86% 52%, 78% 78%, 62% 100%, 38% 100%, 22% 78%, 14% 52%, 18% 28%, 32% 10%);
      z-index:5;
    }

    .petal::after{
      content:"";
      position:absolute;
      left:50%;
      top:10px;
      width:2px;
      height:66%;
      transform:translateX(-50%);
      background:rgba(255,255,255,.34);
      border-radius:4px;
      filter:blur(.4px);
    }

    .cup-shadow{
      position:absolute;
      left:50%;
      top:70px;
      width:80px;
      height:32px;
      transform:translateX(-50%);
      background:radial-gradient(circle at 50% 0%, rgba(122,16,64,.28), rgba(122,16,64,0) 70%);
      z-index:3;
      filter:blur(3px);
    }

    .bud{
      position:absolute;
      left:50%;
      top:112px;
      width:28px;height:20px;
      transform:translateX(-50%);
      background:linear-gradient(180deg, #6ec08c, #3f9d67);
      clip-path:polygon(10% 100%, 90% 100%, 72% 0%, 28% 0%);
      border-radius:0 0 8px 8px;
      z-index:1;
    }

    .dog{
      position:absolute;
      right:4vw;
      bottom:6vh;
      width:min(300px, 44vw);
      height:min(210px, 28vw);
      z-index:3;
      animation: dogbob 3.8s ease-in-out infinite;
      filter: drop-shadow(0 14px 16px rgba(0,0,0,.16));
    }

    @keyframes dogbob{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-5px)}
    }

    .name-tag{
      position:absolute;
      right:9%;
      bottom:2.8vh;
      z-index:4;
      background:rgba(255,255,255,.9);
      color:#7b4a32;
      border:2px solid rgba(123,74,50,.18);
      padding:8px 16px;
      border-radius:999px;
      font-size:clamp(.95rem, 2.8vw, 1.2rem);
      box-shadow:0 8px 18px rgba(0,0,0,.12);
      font-weight:bold;
      letter-spacing:.4px;
    }

    .tap{
      margin:8px 0 2px;
      font-size:.95rem;
      color:#9a4b71;
      opacity:.86;
      text-align:center;
      z-index:5;
    }

    .heart-burst{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:20;
    }

    .heart{
      position:absolute;
      font-size:20px;
      animation: rise 3.2s linear forwards;
      opacity:.9;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,.12));
    }

    @keyframes rise{
      0%{transform:translateY(0) scale(.6) rotate(0deg); opacity:0;}
      15%{opacity:1;}
      100%{transform:translateY(-180px) scale(1.5) rotate(16deg); opacity:0;}
    }

    @media (max-width: 720px){
      .flowers{
        gap:0.2vw;
        padding:0 0 11vh;
        justify-content:space-evenly;
      }
      .tulip{ --scale:.83; width:84px; }
      .dog{
        right:1vw;
        width:45vw;
        height:30vw;
        bottom:7vh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap" id="scene">
    <div class="sparkles">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="message">
      <h1>Vale, vamosss tú puedes 💗</h1>
      <p>Tulipanes rosas para recordarte que eres increíble, fuerte y muy capaz.</p>

      <div class="music-row">
        <a class="music-btn" href="https://www.youtube.com/watch?v=btPJPFnesV4" target="_blank" rel="noopener noreferrer">motivación 🤫🦅</a>
      </div>
    </div>

    <div class="scene">
      <div class="flowers">
        <div class="tulip" style="--scale:1.1;">
          <div class="bloom"><div class="petal outer-left"></div><div class="petal outer-right"></div><div class="petal center-left"></div><div class="petal center-right"></div><div class="petal front"></div><div class="cup-shadow"></div><div class="bud"></div></div>
          <div class="stem"></div><div class="leaf left"></div><div class="leaf right"></div>
        </div>
        <div class="tulip" style="--scale:.92;">
          <div class="bloom"><div class="petal outer-left"></div><div class="petal outer-right"></div><div class="petal center-left"></div><div class="petal center-right"></div><div class="petal front"></div><div class="cup-shadow"></div><div class="bud"></div></div>
          <div class="stem"></div><div class="leaf left"></div><div class="leaf right"></div>
        </div>
        <div class="tulip" style="--scale:1.18;">
          <div class="bloom"><div class="petal outer-left"></div><div class="petal outer-right"></div><div class="petal center-left"></div><div class="petal center-right"></div><div class="petal front"></div><div class="cup-shadow"></div><div class="bud"></div></div>
          <div class="stem"></div><div class="leaf left"></div><div class="leaf right"></div>
        </div>
        <div class="tulip" style="--scale:.98;">
          <div class="bloom"><div class="petal outer-left"></div><div class="petal outer-right"></div><div class="petal center-left"></div><div class="petal center-right"></div><div class="petal front"></div><div class="cup-shadow"></div><div class="bud"></div></div>
          <div class="stem"></div><div class="leaf left"></div><div class="leaf right"></div>
        </div>
        <div class="tulip" style="--scale:1.06;">
          <div class="bloom"><div class="petal outer-left"></div><div class="petal outer-right"></div><div class="petal center-left"></div><div class="petal center-right"></div><div class="petal front"></div><div class="cup-shadow"></div><div class="bud"></div></div>
          <div class="stem"></div><div class="leaf left"></div><div class="leaf right"></div>
        </div>
      </div>

      <svg class="dog" viewBox="0 0 420 250" aria-label="Perro salchicha café llamado Sky">
        <path d="M52 135 C25 118, 18 98, 25 82" fill="none" stroke="#6f4630" stroke-width="13" stroke-linecap="round"/>
        <ellipse cx="190" cy="145" rx="120" ry="58" fill="#8a5a3d"/>
        <ellipse cx="188" cy="151" rx="105" ry="42" fill="#9d6a49" opacity=".45"/>
        <ellipse cx="250" cy="164" rx="32" ry="22" fill="#b27a56" opacity=".5"/>
        <ellipse cx="286" cy="132" rx="30" ry="40" fill="#84553a"/>
        <ellipse cx="334" cy="116" rx="58" ry="48" fill="#8a5a3d"/>
        <ellipse cx="344" cy="124" rx="42" ry="30" fill="#9c6b49" opacity=".38"/>
        <path d="M314 116 C297 126, 294 155, 313 176 C332 165, 342 138, 334 114" fill="#5d3726"/>
        <ellipse cx="381" cy="126" rx="28" ry="21" fill="#9b6a48"/>
        <ellipse cx="395" cy="130" rx="12" ry="8" fill="#3f2419"/>
        <circle cx="346" cy="105" r="5.8" fill="#2f1a12"/>
        <circle cx="347.8" cy="103.4" r="1.5" fill="#fff"/>
        <path d="M394 132 Q387 140 377 142" stroke="#4e2e20" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <path d="M379 143 Q370 149 360 146" stroke="#4e2e20" stroke-width="3" fill="none" stroke-linecap="round"/>
        <rect x="272" y="142" width="34" height="12" rx="6" fill="#f1619b"/>
        <circle cx="289" cy="154" r="6" fill="#ffd76c"/>
        <rect x="112" y="182" width="18" height="46" rx="8" fill="#6f4630"/>
        <rect x="175" y="185" width="18" height="43" rx="8" fill="#6f4630"/>
        <rect x="248" y="184" width="18" height="44" rx="8" fill="#6f4630"/>
        <rect x="305" y="177" width="18" height="50" rx="8" fill="#6f4630"/>
        <ellipse cx="121" cy="229" rx="15" ry="8" fill="#4e2e20"/>
        <ellipse cx="184" cy="229" rx="15" ry="8" fill="#4e2e20"/>
        <ellipse cx="257" cy="229" rx="15" ry="8" fill="#4e2e20"/>
        <ellipse cx="314" cy="229" rx="15" ry="8" fill="#4e2e20"/>
      </svg>

      <div class="name-tag">Sky 🐶</div>
      <div class="ground"></div>
    </div>

    <div class="tap">Toca la pantalla para soltar “suerte que la vas a necesitar” ✨</div>
    <div class="heart-burst" id="hearts"></div>
  </div>

  <script>
    const hearts = document.getElementById('hearts');
    function createHeart(x, y){
      const heart = document.createElement('div');
      heart.className = 'heart';
      const icons = ['💗','💖','🌷','✨','💕'];
      heart.textContent = icons[Math.floor(Math.random()*icons.length)];
      heart.style.left = x + 'px';
      heart.style.top = y + 'px';
      hearts.appendChild(heart);
      setTimeout(() => heart.remove(), 3200);
    }
    document.addEventListener('click', (e) => {
      for(let i=0;i<10;i++){
        setTimeout(() => createHeart(
          e.clientX + (Math.random()*80 - 40),
          e.clientY + (Math.random()*50 - 20)
        ), i*90);
      }
    });
    document.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      for(let i=0;i<10;i++){
        setTimeout(() => createHeart(
          t.clientX + (Math.random()*80 - 40),
          t.clientY + (Math.random()*50 - 20)
        ), i*90);
      }
    }, {passive:true});
  </script>
</body>
</html>
